<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PKM TGLK</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
      }
      .circle-wrapper {
        position: relative;
        width: 400px;
        height: 400px;
        border: 4px solid #499be7;
        border-radius: 50%;
        overflow: visible; /* ubah dari hidden jadi visible */
        margin: auto;
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        background: white; /* opsional biar putih di dalam lingkaran */
      }

      .doctor-image {
        position: absolute;
        top: -60px; /* kepala keluar ke atas sekitar 60px */
        left: 50%;
        transform: translateX(-50%);
        width: 280px;
        max-width: none;
        height: auto;
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen bg-gray-50 font-sans text-gray-800">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-10">
      <div class="container mx-auto flex justify-between items-center p-4">
        <div class="flex items-center space-x-2">
          <span class="text-pink-500 text-2xl font-bold">➕</span>
          <h1 class="text-pink-500 text-2xl font-bold">Puskesmas Trenggalek</h1>
        </div>
        <ul class="flex space-x-6 text-gray-700">
          <li><a href="#" class="hover:text-pink-500 font-medium">Home</a></li>
          <li>
            <a href="#" class="hover:text-pink-500 font-medium">Screening</a>
          </li>
          <li>
            <a href="#" class="hover:text-pink-500 font-medium">Contact Us</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main content -->
    <main class="flex-grow mt-6">
      <br /><br />
      <section
        class="container mx-auto mt-12 px-4 flex flex-col-reverse md:flex-row items-center justify-between"
      >
        <!-- Left -->
        <div class="md:w-1/2 mb-8 md:mb-0">
          <h2
            class="text-4xl md:text-5xl font-bold mb-4 text-center text-success"
          >
            Data CKG PKG
          </h2>
          <br />

          <div class="flex flex-wrap justify-center gap-4">
            <a
              href="karangsoko.html"
              class="inline-block px-6 py-3 rounded-full text-white font-semibold bg-pink-500 hover:bg-pink-600 transition text-center"
              >DESA KARANGSOKO</a
            >
            <a
              href="sambirejo.html"
              class="inline-block px-6 py-3 rounded-full text-white font-semibold bg-indigo-600 hover:bg-indigo-700 transition text-center"
              >DESA SAMBIREJO</a
            >
            <a
              href="sumbergedong.html"
              class="inline-block px-6 py-3 rounded-full text-white font-semibold bg-yellow-500 hover:bg-yellow-600 transition text-center"
              >KELURAHAN SUMBERGEDONG</a
            >
            <a
              href="ngantru.html"
              class="inline-block px-6 py-3 rounded-full text-white font-semibold bg-red-500 hover:bg-red-600 transition text-center"
              >KELURAHAN NGANTRU</a
            >
            <a
              href="kelutan.html"
              class="inline-block px-6 py-3 rounded-full text-white font-semibold bg-yellow-500 hover:bg-yellow-600 transition text-center"
              >KELURAHAN KELUTAN</a
            >
            <a
              href="tamanan.html"
              class="inline-block px-6 py-3 rounded-full text-white font-semibold bg-red-500 hover:bg-red-600 transition text-center"
              >KELURAHAN TAMANAN</a
            >
            <a
              href="induk.html"
              class="inline-block px-6 py-3 rounded-full text-white font-semibold bg-green-600 hover:bg-green-700 transition text-center"
              >INDUK</a
            >
            <a
              href="https://pkmtrenggalek.github.io/rekapklaster2/"
              target="_blank"
              class="inline-block px-6 py-3 rounded-full text-white font-semibold bg-pink-600 hover:bg-pink-700 transition text-center"
              >REKAP BIDAN</a
            >
            <a
              href="https://pkmtrenggalek.github.io/LaporanPerawat/"
              target="_blank"
              class="inline-block px-6 py-3 rounded-full text-white font-semibold bg-indigo-600 hover:bg-indigo-700 transition text-center"
              >REKAP PERAWAT</a
            >
          </div>
        </div>

        <!-- Right -->
        <div class="circle-wrapper">
          <img src="dr.murti.png" alt="Dr. Murti" class="doctor-image" />
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-4 mt-12">
      <div
        class="container mx-auto flex justify-between items-center px-4 text-sm"
      >
        <div>© Skrining Puskesmas Trenggalek, All right reserved.</div>
        <div>|2025</div>
      </div>
    </footer>
  </body>
</html>
